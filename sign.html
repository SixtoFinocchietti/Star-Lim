<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Y Registro</title>
    <link rel="stylesheet" href="styleSign.css">
</head>  

<body>
<!-- <img id="dark-mode-toggle" src="imagenesIndex/luna.png"> -->



    <header class="header">

    </header>
 


    <main class="main">

        <div class="contenedor__todo">

            <div class="caja__trasera">
                <div class="caja__trasera-login">
                    <h3>
                        ¿Ya tienes una cuenta?
                    </h3>

                    <p>
                        Inicia sesión para entrar a la página
                    </p>

                    <button id="btn__iniciar-sesion">
                        Iniciar Sesión
                    </button>

                </div>


                <div class="caja__trasera-Registro">
                    <h3>
                        ¿Aún no tienes una cuenta?
                    </h3>

                    <p>
                        Regístrate para que puedas iniciar sesión
                    </p>

                    <button id="btn__registrarse">
                        Registrarse
                    </button>

                </div>

            </div>
            <!--Formularios de Login y Register-->
            <div class="contenedor__login-register">

                <form action="" class="formulario__login">
                    <!--Login-->
                    <h2>
                        Iniciar Sesión
                    </h2>

                    <input type="text" placeholder="Correo Electronico">
                    <input type="password" placeholder="Contraseña">

                    <button>
                        Entrar
                    </button>

                </form>

                <form action="" class="formulario__registro">
                    <!--Registro-->
                    <h2>
                        Registrarse
                    </h2>
                    <input type="text" placeholder="Nombre completo">
                    <input type="text" placeholder="Correo Electronico">
                    <input type="text" placeholder="Usuario">
                    <input type="password" placeholder="Contraseña">

                    <button>
                        Registrarse
                    </button>
                </form>

            </div>

        </div>

    </main>



    <footer class="footer">

    </footer>



    <link rel="stylesheet" href="styleSign.css">
    <script src="scriptSign.js">
        const modoGuardado = localStorage.getItem("modoOscuro");

        if (
            modoGuardado === "activo" ||
            (!modoGuardado && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ){
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</body>

</html>
